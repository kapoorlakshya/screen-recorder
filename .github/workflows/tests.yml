  
name: Tests

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true
      - name: Run rubocop
        run: bundle exec rake rubocop

  test-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: [2.7, 3.3, jruby]
    env:
      DISPLAY: ":0"
    steps:
    - uses: actions/checkout@v4
    - name: Set up ffmpeg
      uses: FedericoCarboni/setup-ffmpeg@v3
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
      id: setup-ffmpeg
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true
    - name: Run headless test
      uses: coactions/setup-xvfb@v1
      with:
        run: bundle exec rake spec

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        ruby-version: [2.7, 3.3, jruby]
    steps:
      - uses: actions/checkout@v4
      - name: Set up ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        id: setup-ffmpeg
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake spec

  test-macos:
    runs-on: macos-13
    strategy:
      matrix:
        ruby-version: [2.7, 3.3]
    steps:
      - uses: actions/checkout@v4
      - name: Set up ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        id: setup-ffmpeg
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake spec